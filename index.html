<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abingdon School | 3D Model Viewer</title>
    <style>
        :root {
            --abingdon-cerise: #D8125C; 
            --abingdon-cerise-hover: #B00D49;
            --bg-body: #F4F5F7;
            --bg-sidebar: #FFFFFF;
            --text-main: #1C2331;
            --text-muted: #5A606E;
            --border-color: #E2E8F0;
            --item-hover: #F8F9FA;
            --item-active: #FFF0F5;
        }

        [data-theme="dark"] {
            --bg-body: #121826;
            --bg-sidebar: #1E2532;
            --text-main: #FFFFFF;
            --text-muted: #A0AEC0;
            --border-color: #2D3748;
            --item-hover: #2A3441;
            --item-active: #3D2235;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        #sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            transition: background-color 0.3s, border-color 0.3s;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .brand-header {
            padding: 25px 20px;
            border-bottom: 3px solid var(--abingdon-cerise);
        }

        .brand-header h1 {
            margin: 0;
            font-size: 1.1rem; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .brand-header p {
            margin: 5px 0 0 0;
            font-size: 0.85rem;
            color: var(--abingdon-cerise);
            font-weight: 600;
        }

        .sidebar-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-list li {
            padding: 12px 15px;
            margin-bottom: 8px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .file-list li:hover {
            background-color: var(--item-hover);
            border-color: var(--abingdon-cerise);
        }

        .file-list li.active {
            background-color: var(--item-active);
            border-color: var(--abingdon-cerise);
            color: var(--abingdon-cerise);
            font-weight: 600;
        }
        
        .status-message {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 20px;
        }

        .controls-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        button.theme-toggle {
            width: 100%;
            padding: 12px;
            background-color: var(--abingdon-cerise);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button.theme-toggle:hover {
            background-color: var(--abingdon-cerise-hover);
        }

        #viewer-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-color: var(--bg-body);
            transition: background-color 0.3s;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1rem;
            font-weight: 600;
            background: var(--abingdon-cerise);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            display: none;
            box-shadow: 0 4px 15px rgba(216, 18, 92, 0.4);
            z-index: 20;
            min-width: 150px;
            text-align: center;
        }
    </style>
</head>
<body data-theme="dark">

    <div id="sidebar">
        <div class="brand-header">
            <h1>Abingdon</h1>
            <p>3D Model Viewer</p>
        </div>
        
        <div class="sidebar-content">
            <ul class="file-list" id="file-list"></ul>
            <div id="sidebar-status" class="status-message">Fetching models from GitHub...</div>
        </div>

        <div class="controls-footer">
            <button class="theme-toggle" id="theme-toggle">Switch to Light Mode</button>
        </div>
    </div>

    <div id="viewer-container">
        <div id="loading">Loading...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ==========================================
        const GITHUB_USERNAME = 'markjohnson-design'; 
        const GITHUB_REPO = 'biology-viewer';          
        // ==========================================

        const body = document.body;
        const themeToggleBtn = document.getElementById('theme-toggle');
        
        function updateSceneBackground() {
            const isDark = body.getAttribute('data-theme') === 'dark';
            scene.background = new THREE.Color(isDark ? 0x121826 : 0xF4F5F7);
            ambientLight.intensity = isDark ? 1.5 : 2.5;
            directionalLight.intensity = isDark ? 1.5 : 2.0;
        }

        themeToggleBtn.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                themeToggleBtn.textContent = 'Switch to Light Mode';
            } else {
                body.setAttribute('data-theme', 'light');
                themeToggleBtn.textContent = 'Switch to Dark Mode';
            }
            updateSceneBackground();
        });

        const container = document.getElementById('viewer-container');
        const loadingDiv = document.getElementById('loading');
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace; 
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5); 
        directionalLight.position.set(1, 1, 1).normalize();
        scene.add(directionalLight);
        updateSceneBackground();

        let currentModel = null;
        const loader = new GLTFLoader();

        function loadModel(downloadUrl) {
            loadingDiv.textContent = 'Loading... 0%';
            loadingDiv.style.display = 'block';

            loader.load(
                downloadUrl,
                function (gltf) {
                    if (currentModel) scene.remove(currentModel);
                    currentModel = gltf.scene;
                    scene.add(currentModel);

                    const box = new THREE.Box3().setFromObject(currentModel);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());

                    currentModel.position.x += (currentModel.position.x - center.x);
                    currentModel.position.y += (currentModel.position.y - center.y);
                    currentModel.position.z += (currentModel.position.z - center.z);

                    const maxDim = Math.max(size.x, size.y, size.z);
                    camera.position.set(maxDim * 1.5, maxDim * 1.5, maxDim * 1.5);
                    camera.lookAt(0, 0, 0);
                    
                    controls.target.set(0, 0, 0);
                    controls.update();

                    loadingDiv.style.display = 'none';
                },
                function (xhr) {
                    if (xhr.lengthComputable) {
                        const percentComplete = Math.round((xhr.loaded / xhr.total) * 100);
                        loadingDiv.textContent = `Loading... ${percentComplete}%`;
                    } else {
                        const mbLoaded = (xhr.loaded / (1024 * 1024)).toFixed(1);
                        loadingDiv.textContent = `Loading... ${mbLoaded} MB`;
                    }
                },
                function (error) {
                    console.error('An error happened', error);
                    loadingDiv.textContent = 'Error loading model';
                    setTimeout(() => { loadingDiv.style.display = 'none'; }, 3000);
                }
            );
        }

        async function fetchGitHubReleases() {
            const statusDiv = document.getElementById('sidebar-status');
            const fileListUl = document.getElementById('file-list');
            
            const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/releases/latest`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Release not found.");
                
                const data = await response.json();
                const glbAssets = data.assets.filter(asset => asset.name.toLowerCase().endsWith('.glb'));

                if (glbAssets.length === 0) {
                    statusDiv.textContent = "No .glb files found.";
                    return;
                }

                statusDiv.style.display = 'none';

                glbAssets.forEach((asset) => {
                    const li = document.createElement('li');
                    li.textContent = asset.name.replace(/\.[^/.]+$/, "");
                    
                    li.addEventListener('click', () => {
                        document.querySelectorAll('.file-list li').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        
                        // MAGIC HAPPENS HERE: We route the download through our new Cloudflare Function
                        const proxyUrl = `/proxy?url=${encodeURIComponent(asset.browser_download_url)}`;
                        loadModel(proxyUrl);
                    });
                    
                    fileListUl.appendChild(li);
                });

                if (fileListUl.firstChild) fileListUl.firstChild.click();

            } catch (error) {
                console.error("Error fetching files:", error);
                statusDiv.textContent = "Error: Check repo name or visibility.";
            }
        }

        fetchGitHubReleases();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
